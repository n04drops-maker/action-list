<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1日15分 行動リスト</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');

    :root {
      --bg: #fffbfb;
      --surface: #ffffff;
      --surface2: #fdf5f5;
      --border: #ecdede;
      --border2: #f0e0e0;

      --accent:   #c0624a;
      --accent2:  #d4874f;
      --accent3:  #6a9fc0;
      --accent4:  #7aaa7a;
      --muted:    #b09090;
      --text:     #2e1e1e;
      --text-mid: #6b4e4e;
      --text-muted: #a08080;

      /* カテゴリカラー */
      --cat-案件:         #c0624a;
      --cat-デザイン:     #d4874f;
      --cat-チェックリスト: #8c7ab5;
      --cat-アーカイブ視聴: #6a9fc0;
      --cat-会員サイト動画視聴: #7aaa7a;
      --cat-その他:       #a09090;
      --cat-カスタム:     #b09060;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      /* Morisawa UD新ゴ相当のWebフォントフォールバック */
      font-family: 'Noto Sans JP', 'UD デジタル 教科書体 NK-R', 'Yu Gothic', 'メイリオ', sans-serif;
      min-height: 100vh;
      padding: 32px 16px 80px;
      display: flex;
      justify-content: center;
    }

    .layout {
      width: 100%;
      max-width: 940px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
      align-items: start;
    }

    /* ===== ページヘッダー ===== */
    .page-header {
      grid-column: 1 / -1;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 4px;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    .page-header h1 {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0.06em;
      color: var(--accent);
    }

    .page-header p {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    /* ===== カード共通 ===== */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .card-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: var(--surface2);
    }

    .card-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--text-mid);
    }

    /* ===== 左：マスターパネル ===== */
    .master-panel { position: sticky; top: 20px; }

    /* カテゴリタブ */
    .cat-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .cat-tab {
      padding: 3px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s;
      letter-spacing: 0.02em;
    }

    .cat-tab:hover {
      color: var(--text);
      border-color: var(--muted);
    }

    .cat-tab.active {
      color: white;
      border-color: transparent;
      font-weight: 700;
    }

    /* 検索 */
    .search-box {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }

    .search-wrap { position: relative; }

    .search-icon {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 7px 10px 7px 28px;
      font-family: inherit;
      font-size: 12px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-muted); }

    /* マスター一覧 */
    .master-list {
      max-height: 420px;
      overflow-y: auto;
      padding: 8px;
    }

    .master-list::-webkit-scrollbar { width: 3px; }
    .master-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .master-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.12s;
      margin-bottom: 2px;
    }

    .master-item:hover { background: var(--surface2); }

    .master-item-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .master-item-info { flex: 1; min-width: 0; }

    .master-item-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .master-item-cat {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .master-item-add {
      width: 22px;
      height: 22px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-mid);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.12s, background 0.12s;
      line-height: 1;
    }

    .master-item:hover .master-item-add {
      opacity: 1;
    }

    .master-item-add:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* カスタム追加 */
    .custom-add {
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 6px;
    }

    .custom-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 7px 10px;
      font-family: inherit;
      font-size: 12px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .custom-input:focus { border-color: var(--accent2); }
    .custom-input::placeholder { color: var(--text-muted); }

    .custom-add-btn {
      background: var(--accent2);
      border: none;
      border-radius: 6px;
      color: white;
      padding: 0 12px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.12s;
      white-space: nowrap;
    }

    .custom-add-btn:hover { opacity: 0.85; }

    /* マスター新規登録ボタン */
    .new-master-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 11px;
      padding: 3px 10px;
      cursor: pointer;
      transition: all 0.12s;
    }

    .new-master-btn:hover {
      border-color: var(--accent3);
      color: var(--accent3);
    }

    /* ===== 右：TODOパネル ===== */
    .todo-stats { display: flex; gap: 6px; }

    .stat-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 3px;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .stat-badge.active-stat { border-color: var(--accent); color: var(--accent); }
    .stat-badge.done-stat   { border-color: var(--accent4); color: var(--accent4); }

    .todo-filters {
      padding: 8px 12px;
      display: flex;
      gap: 5px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .filter-btn {
      padding: 4px 12px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s;
    }

    .filter-btn:hover { color: var(--text); }

    .filter-btn.active {
      background: var(--surface);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 700;
    }

    /* TODOアイテム */
    .todo-list {
      padding: 8px;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: var(--surface);
      transition: border-color 0.15s, transform 0.15s;
      animation: slideIn 0.25s ease both;
      position: relative;
      border-left: 3px solid var(--item-color, var(--accent));
    }

    .todo-item:hover {
      transform: translateY(-1px);
      border-color: var(--item-color, var(--accent));
    }

    .todo-item.done { opacity: 0.5; }
    .todo-item.done .todo-name { text-decoration: line-through; color: var(--text-muted); }

    .todo-item.removing {
      animation: removeAnim 0.25s ease forwards;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes removeAnim {
      to { opacity: 0; transform: translateX(-12px); max-height: 0; padding: 0; margin: 0; border: none; }
    }

    .todo-check {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      border: 1.5px solid var(--item-color, var(--accent));
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
      transition: all 0.12s;
      color: white;
    }

    .todo-check:hover { transform: scale(1.1); }
    .todo-item.done .todo-check { background: var(--item-color, var(--accent)); }

    .todo-body { flex: 1; min-width: 0; }

    .todo-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .todo-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 3px;
      flex-wrap: wrap;
    }

    .todo-cat-tag {
      font-size: 10px;
      font-weight: 500;
      padding: 1px 6px;
      border-radius: 3px;
      border: 1px solid currentColor;
      opacity: 0.7;
    }

    .todo-completed-at {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent4);
    }

    .todo-delete {
      background: none;
      border: none;
      color: var(--border);
      font-size: 14px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.12s, color 0.12s;
      flex-shrink: 0;
      padding: 2px 4px;
    }

    .todo-item:hover .todo-delete { opacity: 1; }
    .todo-delete:hover { color: var(--accent); }

    /* 空状態 */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
    }

    .empty-state .e-icon {
      font-size: 36px;
      display: block;
      margin-bottom: 10px;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 12px;
      line-height: 1.9;
    }

    /* 完了クリアボタン */
    .clear-done {
      margin: 0 8px 10px;
      width: calc(100% - 16px);
      padding: 8px;
      border-radius: 6px;
      border: 1px dashed var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.04em;
    }

    .clear-done:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: #fdf5f5;
    }

    /* ===== モーダル ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(46,30,30,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s;
    }

    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 380px;
      transform: scale(0.96);
      transition: transform 0.18s;
    }

    .modal-overlay.open .modal { transform: scale(1); }

    .modal h3 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 18px;
      color: var(--text);
    }

    .modal-field { margin-bottom: 12px; }

    .modal-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 5px;
      display: block;
      letter-spacing: 0.06em;
    }

    .modal-input, .modal-select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 8px 10px;
      font-family: inherit;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .modal-input:focus, .modal-select:focus { border-color: var(--accent); }

    .modal-actions { display: flex; gap: 8px; margin-top: 18px; }

    .modal-btn {
      flex: 1;
      padding: 9px;
      border-radius: 6px;
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.12s;
      letter-spacing: 0.04em;
    }

    .modal-btn.primary { background: var(--accent); color: white; }
    .modal-btn.secondary { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
    .modal-btn:hover { opacity: 0.82; }

    /* ===== スマホ対応 ===== */
    .mobile-tabs { display: none; }

    @media (max-width: 680px) {
      body { padding: 0 0 80px; }

      .layout {
        grid-template-columns: 1fr;
        gap: 0;
        max-width: 100%;
      }

      .page-header {
        padding: 14px 16px 10px;
        margin-bottom: 0;
        flex-direction: column;
        align-items: flex-start;
        gap: 2px;
        background: var(--surface);
        position: sticky;
        top: 0;
        z-index: 10;
        border-radius: 0;
        border-left: none;
        border-right: none;
        border-top: none;
      }

      .page-header h1 { font-size: 16px; }
      .page-header p  { font-size: 11px; }

      /* タブナビ */
      .mobile-tabs {
        display: flex;
        grid-column: 1 / -1;
        background: var(--surface);
        border-bottom: 2px solid var(--border);
        position: sticky;
        top: 52px;
        z-index: 9;
      }

      .mobile-tab-btn {
        flex: 1;
        padding: 11px 8px;
        border: none;
        background: transparent;
        font-family: inherit;
        font-size: 13px;
        font-weight: 700;
        color: var(--text-muted);
        cursor: pointer;
        border-bottom: 3px solid transparent;
        transition: color 0.15s, border-color 0.15s;
      }

      .mobile-tab-btn.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      .master-panel,
      .todo-panel-wrap {
        border-radius: 0;
        border-left: none;
        border-right: none;
        border-top: none;
      }

      .master-panel { position: static; }

      .master-panel.hidden,
      .todo-panel-wrap.hidden { display: none; }

      /* カテゴリタブ横スクロール */
      .cat-tabs {
        gap: 6px;
        padding: 10px 12px;
        overflow-x: auto;
        flex-wrap: nowrap;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .cat-tabs::-webkit-scrollbar { display: none; }
      .cat-tab {
        white-space: nowrap;
        flex-shrink: 0;
        padding: 5px 12px;
        font-size: 12px;
      }

      /* マスターリスト */
      .master-list { max-height: none; padding: 6px 8px; }
      .master-item { padding: 13px 10px; margin-bottom: 3px; }
      .master-item-name { font-size: 14px; }

      /* ＋ボタン常時表示 */
      .master-item-add {
        opacity: 1 !important;
        width: 32px;
        height: 32px;
        font-size: 18px;
      }

      /* カスタム追加 */
      .custom-add { padding: 12px; }
      .custom-input { font-size: 16px; padding: 10px 12px; }
      .custom-add-btn { padding: 0 16px; font-size: 14px; min-height: 44px; }

      /* フィルター */
      .todo-filters { padding: 10px 12px; gap: 6px; }
      .filter-btn { flex: 1; text-align: center; padding: 8px 4px; font-size: 12px; }

      /* TODOアイテム */
      .todo-list { padding: 8px; gap: 6px; }
      .todo-item { padding: 12px 12px; }
      .todo-check { width: 22px; height: 22px; font-size: 13px; }
      .todo-name  { font-size: 14px; }

      /* 削除ボタン常時表示 */
      .todo-delete {
        opacity: 1 !important;
        color: var(--text-muted) !important;
        font-size: 16px;
        padding: 4px 6px;
        min-width: 30px;
        min-height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* 検索 */
      .search-input { font-size: 16px; }

      /* カードヘッダー */
      .card-header { padding: 12px 14px 10px; }
      .card-title  { font-size: 13px; }

      /* 完了クリア */
      .clear-done { margin: 0 8px 12px; padding: 12px; font-size: 13px; }

      /* モーダル */
      .modal { width: 94%; padding: 20px; }
      .modal-input, .modal-select { font-size: 16px; }
      .modal-btn { min-height: 44px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="layout">

    <!-- ページヘッダー -->
    <div class="page-header">
      <h1>1日15分 行動リスト</h1>
      <p>タスクを選んで、今日の15分を動かそう</p>
    </div>

    <!-- モバイル用タブナビ -->
    <div class="mobile-tabs">
      <button class="mobile-tab-btn active" data-tab="master" onclick="switchTab('master')">📋 タスクマスター</button>
      <button class="mobile-tab-btn" data-tab="todo" onclick="switchTab('todo')">✅ 今日のTODO</button>
    </div>

    <!-- ===== 左：マスターリスト ===== -->
    <div class="card master-panel" id="masterPanel">
      <div class="card-header">
        <span class="card-title">タスクマスター</span>
        <button class="new-master-btn" onclick="openModal()">＋ 新規登録</button>
      </div>

      <div class="cat-tabs" id="catTabs"></div>

      <div class="search-box">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input class="search-input" id="searchInput" type="text" placeholder="タスクを検索...">
        </div>
      </div>

      <div class="master-list" id="masterList"></div>

      <div class="custom-add">
        <input class="custom-input" id="customInput" type="text" placeholder="カスタムタスクを直接追加..." maxlength="50">
        <button class="custom-add-btn" onclick="addCustomTask()">追加</button>
      </div>
    </div>

    <!-- ===== 右：TODOリスト ===== -->
    <div class="card todo-panel-wrap" id="todoPanel">
      <div class="card-header">
        <span class="card-title">今日のTODO</span>
        <div class="todo-stats" id="todoStats"></div>
      </div>

      <div class="todo-filters">
        <button class="filter-btn active" data-f="all">すべて</button>
        <button class="filter-btn" data-f="active">未完了</button>
        <button class="filter-btn" data-f="done">完了済み</button>
      </div>

      <div class="todo-list" id="todoList"></div>
      <button class="clear-done" id="clearDone" style="display:none" onclick="clearDone()">完了済みをまとめて削除</button>
    </div><!-- /todo-panel-wrap -->

  </div>

  <!-- モーダル：マスタータスク登録 -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h3>マスタータスクを登録</h3>
      <div class="modal-field">
        <label class="modal-label">タスク名</label>
        <input class="modal-input" id="newTaskName" type="text" placeholder="タスク名を入力" maxlength="50">
      </div>
      <div class="modal-field">
        <label class="modal-label">カテゴリ</label>
        <select class="modal-select" id="newTaskCat">
          <option value="案件">案件</option>
          <option value="デザイン">デザイン</option>
          <option value="チェックリスト">チェックリスト</option>
          <option value="アーカイブ視聴">アーカイブ視聴</option>
          <option value="会員サイト動画視聴">会員サイト動画視聴</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="modal-btn secondary" onclick="closeModal()">キャンセル</button>
        <button class="modal-btn primary" onclick="saveMasterTask()">登録する</button>
      </div>
    </div>
  </div>

  <script>
    // ===== カテゴリカラーマップ =====
    const CAT_COLORS = {
      '案件':           '#c0624a',
      'デザイン':       '#d4874f',
      'チェックリスト': '#8c7ab5',
      'アーカイブ視聴': '#6a9fc0',
      '会員サイト動画視聴': '#7aaa7a',
      'その他':         '#a09090',
      'カスタム':       '#b09060',
    };

    // ===== デフォルトマスター =====
    const DEFAULT_MASTERS = [
      { id: 1,  name: '案件探し&保存',       cat: '案件',           icon: '' },
      { id: 2,  name: '案件応募',             cat: '案件',           icon: '' },
      { id: 3,  name: 'バナー言語化',         cat: 'デザイン',       icon: '' },
      { id: 4,  name: '自主制作',             cat: 'デザイン',       icon: '' },
      { id: 5,  name: 'トレース',             cat: 'デザイン',       icon: '' },
      { id: 6,  name: 'オンライン秘書CL',     cat: 'チェックリスト', icon: '' },
      { id: 7,  name: '【ア】リモラジオ',     cat: 'アーカイブ視聴', icon: '' },
      { id: 8,  name: '【ア】全体セミナー',   cat: 'アーカイブ視聴', icon: '' },
      { id: 9,  name: '【ア】CW報告会',       cat: '会員サイト動画視聴', icon: '' },
    ];

    const FIXED_CATS = ['すべて', '案件', 'デザイン', 'チェックリスト', 'アーカイブ視聴', '会員サイト動画視聴', 'その他'];

    let masters = JSON.parse(localStorage.getItem('action-masters') || 'null') || DEFAULT_MASTERS;
    let todos   = JSON.parse(localStorage.getItem('action-todos')   || '[]');
    let selectedCat  = 'すべて';
    let searchQuery  = '';
    let todoFilter   = 'all';

    function save() {
      localStorage.setItem('action-masters', JSON.stringify(masters));
      localStorage.setItem('action-todos',   JSON.stringify(todos));
    }

    // ===== モバイルタブ切り替え =====
    function switchTab(tab) {
      const isMobile = window.innerWidth <= 680;
      if (!isMobile) return;
      document.querySelectorAll('.mobile-tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      document.getElementById('masterPanel').classList.toggle('hidden', tab !== 'master');
      document.getElementById('todoPanel').classList.toggle('hidden', tab !== 'todo');
    }

    // ウィンドウリサイズ時にリセット
    window.addEventListener('resize', () => {
      if (window.innerWidth > 680) {
        document.getElementById('masterPanel').classList.remove('hidden');
        document.getElementById('todoPanel').classList.remove('hidden');
      }
    });

    // ===== カテゴリタブ =====
    function renderCatTabs() {
      // 固定カテゴリ ＋ ユーザー追加カテゴリ
      const extra = [...new Set(masters.map(m => m.cat))].filter(c => !FIXED_CATS.includes(c));
      const cats  = [...FIXED_CATS, ...extra];

      document.getElementById('catTabs').innerHTML = cats.map(c => `
        <button class="cat-tab ${c === selectedCat ? 'active' : ''}"
          style="${c === selectedCat && c !== 'すべて' ? `background:${CAT_COLORS[c] || '#a09090'};border-color:${CAT_COLORS[c] || '#a09090'}` : ''}"
          onclick="setCat('${escHtml(c)}')">${escHtml(c)}</button>
      `).join('');
    }

    function setCat(cat) {
      selectedCat = cat;
      renderCatTabs();
      renderMasterList();
    }

    // ===== マスターリスト =====
    function renderMasterList() {
      let filtered = masters.filter(m => {
        const catOk    = selectedCat === 'すべて' || m.cat === selectedCat;
        const searchOk = !searchQuery || m.name.includes(searchQuery) || m.cat.includes(searchQuery);
        return catOk && searchOk;
      });

      const el = document.getElementById('masterList');

      if (filtered.length === 0) {
        el.innerHTML = `<div style="text-align:center;padding:28px;color:var(--text-muted);font-size:12px;">タスクが見つかりません</div>`;
        return;
      }

      el.innerHTML = filtered.map(m => {
        const col = CAT_COLORS[m.cat] || '#a09090';
        return `
        <div class="master-item" onclick="addToTodo(${m.id})">
          <div class="master-item-dot" style="background:${col}"></div>
          <div class="master-item-info">
            <div class="master-item-name">${escHtml(m.name)}</div>
            <div class="master-item-cat" style="color:${col}">${escHtml(m.cat)}</div>
          </div>
          <button class="master-item-add" title="TODOに追加">＋</button>
        </div>`;
      }).join('');
    }

    // ===== TODOに追加（何度でも可） =====
    function addToTodo(masterId) {
      const master = masters.find(m => m.id === masterId);
      if (!master) return;
      todos.unshift({
        id:          Date.now(),
        masterId:    master.id,
        name:        master.name,
        cat:         master.cat,
        done:        false,
        completedAt: null
      });
      save();
      renderTodoList();
      // モバイルはTODOタブへ自動切り替え
      switchTab('todo');
    }

    function addCustomTask() {
      const input = document.getElementById('customInput');
      const text  = input.value.trim();
      if (!text) return;
      todos.unshift({
        id:          Date.now(),
        masterId:    null,
        name:        text,
        cat:         'カスタム',
        done:        false,
        completedAt: null
      });
      input.value = '';
      save();
      renderTodoList();
      switchTab('todo');
    }

    // ===== TODO操作 =====
    function toggleTodo(id) {
      todos = todos.map(t => {
        if (t.id !== id) return t;
        const nowDone = !t.done;
        return { ...t, done: nowDone, completedAt: nowDone ? Date.now() : null };
      });
      save();
      renderTodoList();
    }

    function deleteTodo(id) {
      const el = document.querySelector(`.todo-item[data-id="${id}"]`);
      if (el) {
        el.classList.add('removing');
        setTimeout(() => {
          todos = todos.filter(t => t.id !== id);
          save();
          renderTodoList();
        }, 240);
      }
    }

    function clearDone() {
      document.querySelectorAll('.todo-item.done').forEach(el => el.classList.add('removing'));
      setTimeout(() => {
        todos = todos.filter(t => !t.done);
        save();
        renderTodoList();
      }, 250);
    }

    function formatDate(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    // ===== TODOリスト描画 =====
    function renderTodoList() {
      let filtered = todos;
      if (todoFilter === 'active') filtered = todos.filter(t => !t.done);
      if (todoFilter === 'done')   filtered = todos.filter(t => t.done);

      const total     = todos.length;
      const doneCount = todos.filter(t => t.done).length;

      document.getElementById('todoStats').innerHTML = `
        <span class="stat-badge active-stat">${total - doneCount} 未完了</span>
        <span class="stat-badge done-stat">${doneCount} 完了</span>
      `;

      document.getElementById('clearDone').style.display = doneCount > 0 ? 'block' : 'none';

      const list = document.getElementById('todoList');

      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <span class="e-icon">${todoFilter === 'done' ? '✓' : '○'}</span>
            <p>${todoFilter === 'done'
              ? '完了済みのタスクはありません'
              : todoFilter === 'active'
                ? 'すべてのタスクが完了しています'
                : '左のマスターからタスクを選んで追加してください'}</p>
          </div>`;
        return;
      }

      list.innerHTML = filtered.map((t, i) => {
        const col = CAT_COLORS[t.cat] || '#c0624a';
        return `
        <div class="todo-item ${t.done ? 'done' : ''}" data-id="${t.id}"
          style="--item-color:${col}; animation-delay:${i * 0.03}s">
          <button class="todo-check" onclick="toggleTodo(${t.id})"
            style="border-color:${col}">
            ${t.done ? '✓' : ''}
          </button>
          <div class="todo-body">
            <div class="todo-name">${escHtml(t.name)}</div>
            <div class="todo-meta">
              <span class="todo-cat-tag" style="color:${col}">${escHtml(t.cat)}</span>
              ${t.done && t.completedAt
                ? `<span class="todo-completed-at">✓ ${formatDate(t.completedAt)}</span>`
                : ''}
            </div>
          </div>
          <button class="todo-delete" onclick="deleteTodo(${t.id})" title="削除">×</button>
        </div>`;
      }).join('');
    }

    // ===== フィルター =====
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        todoFilter = btn.dataset.f;
        renderTodoList();
      });
    });

    // ===== 検索 =====
    document.getElementById('searchInput').addEventListener('input', e => {
      searchQuery = e.target.value.trim();
      renderMasterList();
    });

    // カスタムEnter
    document.getElementById('customInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addCustomTask();
    });

    // ===== モーダル =====
    function openModal() {
      document.getElementById('modal').classList.add('open');
      document.getElementById('newTaskName').focus();
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
    }

    function saveMasterTask() {
      const name = document.getElementById('newTaskName').value.trim();
      const cat  = document.getElementById('newTaskCat').value;
      if (!name) return;
      masters.push({ id: Date.now(), name, cat, icon: '' });
      save();
      closeModal();
      document.getElementById('newTaskName').value = '';
      renderCatTabs();
      renderMasterList();
    }

    document.getElementById('modal').addEventListener('click', e => {
      if (e.target === document.getElementById('modal')) closeModal();
    });

    document.getElementById('newTaskName').addEventListener('keydown', e => {
      if (e.key === 'Enter') saveMasterTask();
    });

    // ===== ユーティリティ =====
    function escHtml(t) {
      return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ===== 初期描画 =====
    renderCatTabs();
    renderMasterList();
    renderTodoList();
  </script>
</body>
</html>
